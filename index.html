<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>模拟法庭 v2.1 — 民法典实战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#D4A745;--gold-light:#E8C36A;--gold-dark:#B8860B;--bg:#2A1A0E;--card:#F5E6C8;--card2:#ECD9B0;--text:#2C1810;--text-light:#FFF8EE;--text-dim:#C4A882;--text-muted:#A08C6E;--green:#4CAF50;--red:#C62828;--blue:#5C9ABF;--orange:#E8A020;--panel:rgba(30,18,10,.82)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:20px;background:var(--bg);color:var(--text-light);line-height:1.7;letter-spacing:.02em;min-height:100vh;overflow-x:hidden;background-image:url('court-bg.png');background-size:cover;background-position:center;background-attachment:fixed}
#app{max-width:800px;margin:0 auto;padding:20px;animation:screenEnter .4s ease}
.serif{font-family:Georgia,'Noto Serif SC','Songti SC',serif}
.wax-seal{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#B22222,#8B1A1A 60%,#5C0E0E);color:#F5E6C8;font-size:1.6em;box-shadow:0 4px 12px rgba(139,26,26,.4),inset 0 -2px 6px rgba(0,0,0,.3)}
.brass-divider{height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-light),var(--gold),transparent);margin:16px 0;border:none}
.title-screen{text-align:center;padding:48px 24px;background:var(--panel);border-radius:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,167,69,.15)}
.title-screen h1{font-size:3em;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;text-shadow:none}
.title-screen .gavel{font-size:3.2em;display:inline-block;animation:gavelBounce 2s ease infinite}
.title-screen .stats{display:flex;justify-content:center;gap:16px;margin:24px 0;color:var(--text);font-size:1em;flex-wrap:wrap}
.title-screen .stats span{background:var(--card);padding:8px 18px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.title-screen .start-btn{margin-top:28px}
.filters{display:flex;gap:8px;overflow-x:auto;padding:8px 0;margin-bottom:16px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-tab{padding:8px 18px;border-radius:20px;background:var(--card);color:var(--text);border:1px solid transparent;cursor:pointer;white-space:nowrap;font-size:.9em;transition:all .2s}
.filter-tab:hover{border-color:var(--gold-dark)}
.filter-tab.active{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#fff;border-color:var(--gold)}
.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;animation:fadeIn .3s ease}
.case-card{background:var(--card);border-radius:14px;padding:16px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;border-left:4px solid var(--gold);box-shadow:0 2px 10px rgba(0,0,0,.2)}
.case-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,0,0,.35)}
.case-card[data-theme=property]{border-left-color:#14a3a8}
.case-card[data-theme=contract]{border-left-color:#d4a017}
.case-card[data-theme=tort]{border-left-color:#e05a3a}
.case-card[data-theme=personality]{border-left-color:#8e44ad}
.case-card[data-theme=finance]{border-left-color:#c9a84c}
.case-card[data-theme=family]{border-left-color:#5d8a6b}
.case-card .difficulty{position:absolute;top:10px;right:10px;font-size:.7em;padding:2px 8px;border-radius:10px;font-weight:600}
.difficulty.easy{background:rgba(46,204,113,.15);color:var(--green)}
.difficulty.medium{background:rgba(243,156,18,.15);color:var(--orange)}
.difficulty.hard{background:rgba(231,76,60,.15);color:var(--red)}
.case-card .completion-star{position:absolute;bottom:10px;right:10px;font-size:1.1em;opacity:.4}
.case-card .completion-star.done{opacity:1;filter:drop-shadow(0 0 4px var(--gold))}
.case-card .title{font-size:1em;font-weight:600;margin-bottom:6px;color:var(--text)}
.case-card .desc{font-size:.85em;color:var(--text-dim);line-height:1.5}
.briefing{animation:slideUp .3s ease;background:var(--panel);border-radius:20px;padding:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,167,69,.1)}
.briefing-card{background:var(--card);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.briefing-card h2{font-size:1.25em;margin-bottom:12px;color:var(--text)}
.parties{display:flex;gap:12px;margin:12px 0}
.parties>div{flex:1;background:var(--card2);border-radius:10px;padding:12px;text-align:center;font-size:.85em}
.parties .emoji{font-size:1.8em;display:block;margin-bottom:4px}
.your-role{background:linear-gradient(135deg,rgba(230,168,23,.15),rgba(245,208,97,.08));border:1px solid rgba(230,168,23,.3);border-radius:10px;padding:16px;margin-top:12px;font-size:.95em;color:var(--text-light)}
.ev-phase{animation:screenEnter .4s ease;background:var(--panel);border-radius:20px;padding:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,167,69,.1)}
.ev-phase h3{margin-bottom:14px;color:var(--gold-light);font-size:1.2em}
.ev-timer{text-align:center;font-size:1.6em;font-weight:700;color:var(--gold-light);margin-bottom:14px;font-variant-numeric:tabular-nums}
.ev-list{display:flex;flex-direction:column;gap:8px}
.ev-item{display:flex;align-items:flex-start;gap:12px;background:var(--card);border-radius:12px;padding:14px;border:1px solid rgba(44,24,16,.1);transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.ev-item.adopted{border-color:var(--gold);background:var(--card2);box-shadow:0 0 8px rgba(184,134,11,.15)}
.ev-item .ev-info{flex:1;min-width:0}
.ev-item .ev-title{font-weight:600;font-size:.95em;color:var(--text);margin-bottom:4px}
.ev-item .ev-desc{font-size:.85em;color:var(--text-dim);line-height:1.5}
.ev-toggle{width:48px;height:28px;border-radius:14px;background:#C4B49A;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s;margin-top:2px}
.ev-toggle.on{background:var(--gold)}
.ev-toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.ev-toggle.on::after{transform:translateX(20px)}
.ev-result-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
.ev-result-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;font-size:.9em}
.ev-result-item.correct{background:rgba(46,125,50,.1);border-left:3px solid var(--green)}
.ev-result-item.wrong{background:rgba(139,26,26,.1);border-left:3px solid var(--red)}
.ev-result-item.neutral{background:rgba(139,115,85,.08);border-left:3px solid var(--text-muted)}
.ev-result-item .ev-r-icon{font-size:1.2em;flex-shrink:0}
.ev-result-item .ev-r-text{flex:1}
.ev-score-summary{text-align:center;padding:20px;background:var(--card);border-radius:14px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.conviction-bar{position:relative;height:8px;background:var(--card2);border-radius:4px;margin-bottom:14px;overflow:visible}
.conviction-bar .fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));transition:width .5s ease}
.conviction-bar .label{position:absolute;right:0;top:-20px;font-size:.75em;color:var(--text-dim)}
.conviction-bar .judge-emoji{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:1.2em}
.emotion-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:.85em}
.emotion-row .client,.emotion-row .opponent{display:flex;align-items:center;gap:6px}
.emotion-row .emoji{font-size:1.4em;transition:transform .3s}
.emotion-row .emoji.changed{animation:bounce .4s ease}
.emotion-row .label{color:var(--text-dim);font-size:.8em}
.combo-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--red),var(--orange));color:#F5E6C8;padding:3px 10px;border-radius:12px;font-size:.8em;font-weight:700;animation:comboPop .4s ease}
.round-badge{display:inline-block;background:var(--card2);padding:4px 12px;border-radius:8px;font-size:.8em;color:var(--text-dim);margin-bottom:8px}
.score-display{float:right;font-size:.9em;color:var(--gold-light);font-weight:600}
.progress-bar{height:3px;background:var(--card2);border-radius:2px;margin:10px 0}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold-light));border-radius:2px;transition:width .4s}
.dialogue{margin:12px 0;max-height:400px;overflow-y:auto}
.dialogue-item{display:flex;gap:10px;margin-bottom:12px;animation:fadeIn .3s ease}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0}
.bubble{padding:12px 16px;border-radius:12px;font-size:.95em;line-height:1.6;max-width:85%}
.dialogue-item.judge .avatar{background:rgba(212,167,69,.25)}
.dialogue-item.judge .bubble{background:rgba(212,167,69,.12);border:1px solid rgba(212,167,69,.25);color:var(--text-light)}
.dialogue-item.opponent .avatar{background:rgba(198,40,40,.25)}
.dialogue-item.opponent .bubble{background:rgba(198,40,40,.1);border:1px solid rgba(198,40,40,.2);color:var(--text-light)}
.dialogue-item.player .avatar{background:rgba(92,154,191,.3)}
.dialogue-item.player .bubble{background:rgba(92,154,191,.12);border:1px solid rgba(92,154,191,.25);color:var(--text-light)}
.dialogue-item.narrator .bubble{background:rgba(255,248,238,.08);color:var(--text-dim);font-style:italic;border:1px solid rgba(255,248,238,.12)}
.choices-section{margin-top:14px}
.choice-btn{display:block;width:100%;text-align:left;padding:14px 18px;margin-bottom:10px;background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:var(--text);cursor:pointer;font-size:.95em;transition:all .2s;line-height:1.5}
.choice-btn:hover{border-color:var(--gold-dark);background:rgba(230,168,23,.06);transform:translateX(4px)}
.choice-btn.correct,.choice-btn.best{border-color:var(--green);background:rgba(46,204,113,.1)}
.choice-btn.wrong{border-color:var(--red);background:rgba(231,76,60,.08);opacity:.7}
.choice-btn.golden{border-color:var(--gold);background:rgba(230,168,23,.06)}
.choice-btn.disabled{pointer-events:none}
.feedback{padding:14px 16px;border-radius:10px;margin-top:10px;font-size:.9em;animation:fadeIn .3s;color:var(--text-light)}
.feedback.good{background:rgba(46,204,113,.1);border-left:3px solid var(--green)}
.feedback.ok{background:rgba(243,156,18,.1);border-left:3px solid var(--orange)}
.feedback.bad{background:rgba(231,76,60,.1);border-left:3px solid var(--red)}
.objection-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100}
.objection-btn{width:64px;height:64px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:.7em;font-weight:700;cursor:pointer;position:relative;animation:objPulse 1.5s ease infinite;box-shadow:0 4px 20px rgba(231,76,60,.4);display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1.2}
.objection-btn .countdown-ring{position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(var(--gold) var(--ring-pct,100%),transparent 0);mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px))}
.objection-btn:disabled{opacity:.4;animation:none;cursor:default}
.verdict{text-align:center;padding:32px 24px;animation:slideUp .4s ease;background:var(--panel);border-radius:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,167,69,.1)}
.verdict .icon{font-size:3em;margin-bottom:10px}
.verdict .title{font-size:1.6em;font-weight:700;margin-bottom:8px}
.verdict .score{font-size:2.2em;color:var(--gold-light);font-weight:700;margin:12px 0}
.verdict .breakdown{width:100%;border-collapse:collapse;margin-top:16px;font-size:.9em}
.verdict .breakdown td{padding:10px 14px;border-bottom:1px solid rgba(255,248,238,.08)}
.verdict .breakdown td:last-child{text-align:right;color:var(--gold-light);font-weight:600}
.final{text-align:center;padding:32px 24px;animation:slideUp .5s ease;background:var(--panel);border-radius:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,167,69,.1)}
.final .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dark),var(--gold-light));font-size:2em;margin-bottom:12px;box-shadow:0 4px 24px rgba(230,168,23,.3)}
.final .total-score{font-size:2.4em;font-weight:700;color:var(--gold-light);animation:scoreCount .6s ease}
.final .case-summary{margin-top:16px;text-align:left;background:var(--card);border-radius:12px;padding:14px}
.final .case-summary .item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(245,230,200,.1);font-size:.85em;color:var(--text)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:14px 32px;border-radius:10px;font-size:1.05em;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#fff;box-shadow:0 2px 12px rgba(230,168,23,.25)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(230,168,23,.35)}
.btn-secondary{background:transparent;border:1px solid var(--gold-dark);color:var(--gold-light)}
.btn-secondary:hover{background:rgba(230,168,23,.08)}
.btn-small{padding:6px 14px;font-size:.8em;border-radius:8px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes gavelBounce{0%,100%{transform:rotate(0)}15%{transform:rotate(-30deg)}30%{transform:rotate(0)}45%{transform:rotate(-15deg)}60%{transform:rotate(0)}}
@keyframes objPulse{0%,100%{transform:scale(1);box-shadow:0 4px 20px rgba(231,76,60,.4)}50%{transform:scale(1.05);box-shadow:0 4px 30px rgba(231,76,60,.6)}}
@keyframes comboPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes cardFlip{0%{transform:rotateY(0)}100%{transform:rotateY(180deg)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
@keyframes particleFly{0%{transform:translate(0,0);opacity:1}100%{transform:translate(var(--px,30px),var(--py,-60px));opacity:0}}
@keyframes screenEnter{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes scoreCount{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@media(max-width:600px){
body{font-size:17px}
#app{padding:12px}
.title-screen{padding:32px 16px;border-radius:16px}
.title-screen h1{font-size:2.2em}
.title-screen .gavel{font-size:2.4em}
.case-grid{grid-template-columns:1fr}
.ev-item{padding:12px;gap:8px}
.ev-item .ev-desc{font-size:.8em}
.parties{flex-direction:column;gap:8px}
.bubble{font-size:.88em;max-width:90%}
.choice-btn{padding:12px 14px;font-size:.9em}
.emotion-row .label{display:none}
.btn{padding:12px 22px;font-size:.95em}
.verdict .score{font-size:1.8em}
.final .total-score{font-size:2em}
.final .rank-badge{width:64px;height:64px;font-size:1.6em}
.objection-btn{width:56px;height:56px;font-size:.65em}
.dialogue{max-height:300px}
.briefing-card{padding:14px}
.briefing,.ev-phase,.verdict,.final{padding:16px;border-radius:16px}
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--card2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dark)}
*{scrollbar-width:thin;scrollbar-color:var(--card2) var(--bg)}</style>
</head>
<body>
<div id="app"></div>
<script>
const CASES_1 = [
  // ============ Case 1: 二手电脑的秘密 ============
  {
    id: 1,
    title: '二手电脑的秘密',
    subtitle: '善意取得能否保护二手买家？',
    icon: '💻',
    difficulty: 1,
    category: 'property',
    tags: ['物权', '善意取得'],
    briefing: {
      scene: '小王在二手平台以6000元购买了一台MacBook，卖家小李声称"自用半年"。一周后，小李的室友小张拿出购买发票，称这台电脑是自己的，小李未经允许拿去卖掉了。小张要求小王归还电脑。',
      parties: [
        { l: '原告', n: '小张', d: '要求小王返还电脑，主张小李无权处分' },
        { l: '被告', n: '小王', d: '主张善意取得，拒绝返还' }
      ],
      role: '你代理被告小王，需要证明善意取得成立，保住这台电脑。'
    },
    evidence: [
      { t: '二手平台交易截图', c: '显示成交价6000元，卖家账号实名为小李，交易时间及平台担保付款记录', type: 'key' },
      { t: '聊天记录', c: '小李在交易前称"自用半年，没什么问题"，小王询问来源，小李回复"自己买的"', type: 'key' },
      { t: '当面验货视频', c: '小王收货时录制的开箱验货视频，显示当面交付并检查外观功能', type: 'key' },
      { t: '小张购买发票', c: '显示小张于7个月前以8500元购入该MacBook，序列号一致', type: 'neutral' },
      { t: '小李与小张室友关系证明', c: '二人租房合同显示为同一住址合租', type: 'neutral' },
      { t: '小李室友的人品评价', c: '小王的另一位朋友出具书面声明，称小李平时为人不诚实、经常拿别人东西不还，道德品质低劣。', type: 'trap' },
      { t: '邻居听闻的转述', c: '小李隔壁邻居证言称，听小李跟女朋友打电话时提过"那台电脑是室友的，卖了能赚一笔"。', type: 'trap' },
      { t: '事后和解录音', c: '小张曾私下联系小王协商，表示"你再补3000块钱给我，电脑就归你了"，该和解协商的录音记录。', type: 'trap' }
    ],
    goldenRound: 1,
    rounds: [
      {
        phase: '庭前策略',
        dialogue: [
          { speaker: 'narrator', name: '', text: '法庭调查阶段，原告小张主张电脑系其所有，小李无权处分，要求返还。' },
          { speaker: 'judge', name: '审判长', text: '被告代理人，请阐述你方的抗辩思路。' }
        ],
        question: '作为小王的代理人，你选择哪种核心抗辩策略？',
        choices: [
          { text: '依据民法典第311条主张善意取得制度。小李虽系无权处分人，但小王在交易时主观善意且不知情，支付的6000元属二手市场合理对价区间，电脑已通过当面验货完成现实交付。三项法定要件均已具备，小王依法原始取得该电脑所有权，足以对抗原权利人小张的返还请求。', score: 3, feedback: '正确。善意取得是无权处分情形下保护善意买受人的核心制度，准确援引第311条并概括三要件，直击本案要害。' },
          { text: '依据民法典第143条，小王与小李之间的买卖合同系双方真实意思表示，标的合法且不违反强制性规定，合同依法有效。依据第502条，合同自成立时生效，小王基于有效合同取得的电脑占有权受法律保护，小张无权要求返还合同标的物。', score: 1, feedback: '合同有效不等于取得所有权。第143条解决的是合同效力问题，但无权处分的合同即使有效，也不能自动产生物权变动效果，不能直接对抗原权利人的物权请求权。正确做法是援引第311条善意取得制度。' },

function clientIdx(c){return clamp(Math.floor(c/25),0,3)}
function oppIdx(c){return clamp(Math.floor((100-c)/25),0,3)}
function maxScore(ci){const c=CASES[ci];let m=6;c.rounds.forEach((r,i)=>{const best=Math.max(...r.choices.map(ch=>ch.score));const g=(i===c.goldenRound&&r.goldenChoice)?r.goldenChoice.score:0;m+=Math.max(best,g)});return m;}
function casesDone(){return Object.keys(S.done).length}

function particles(x,y){const colors=['#e6a817','#f5d061','#2ecc71','#3498db'];for(let i=0;i<12;i++){const d=document.createElement('div');const px=(Math.random()-.5)*120,py=-(Math.random()*80+20);Object.assign(d.style,{position:'fixed',left:x+'px',top:y+'px',width:'6px',height:'6px',borderRadius:'50%',background:colors[i%4],zIndex:'999',pointerEvents:'none',animation:'particleFly .8s ease forwards','--px':px+'px','--py':py+'px'});document.body.appendChild(d);setTimeout(()=>d.remove(),850)}}

function animNum(el,from,to,dur=500){const st=performance.now();(function frame(t){const p=clamp((t-st)/dur,0,1);el.textContent=Math.round(from+(to-from)*p);if(p<1)requestAnimationFrame(frame)})(st)}

function goTo(scr){S.scr=scr;render()}

function startCase(ci){
  S.ci=ci;S.ri=0;S.cs=0;S.rs=[];S.sel=null;S.fb=false;
  S.ev={adopted:new Set(),timer:60,tid:null,submitted:false,score:0};
  S.conv=50;S.combo=0;S.goldenUnlocked=false;
  S.scr='briefing';render();
}

function startEvidence(){
  S.scr='evidence';S.ev.timer=60;S.ev.submitted=false;render();
  if(S.ev.tid)clearInterval(S.ev.tid);
  S.ev.tid=setInterval(()=>{
    S.ev.timer--;
    const te=document.getElementById('ev-timer');
    if(te)te.textContent=fmtTime(S.ev.timer);
    if(S.ev.timer<=0)submitEvidence();
  },1000);
}

function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

function shuffleEvidence(arr,seed){
  const a=[...arr.map((e,i)=>({...e,_oi:i}))];
  let s=seed;
  function rng(){s=(s*9301+49297)%233280;return s/233280}
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}

function toggleEvidence(idx){
  if(S.ev.submitted)return;
  if(S.ev.adopted.has(idx))S.ev.adopted.delete(idx);
  else S.ev.adopted.add(idx);
  render();
}

function submitEvidence(){
  if(S.ev.submitted)return;
  if(S.ev.tid){clearInterval(S.ev.tid);S.ev.tid=null}
  S.ev.submitted=true;
  const c=CASES[S.ci];
  let score=0;
  const evShuffled=shuffleEvidence(c.evidence,S.ci+1);
  evShuffled.forEach((e,i)=>{
    const adopted=S.ev.adopted.has(i);
    if(e.type==='key'&&adopted)score+=2;
    else if(e.type==='trap'&&adopted)score-=1;
  });
  S.ev.score=Math.max(0,score);
  const keyEvs=evShuffled.filter(e=>e.type==='key');
  const trapAdopted=evShuffled.some((e,i)=>e.type==='trap'&&S.ev.adopted.has(i));
  const allKeyAdopted=keyEvs.every((e,i)=>{const si=evShuffled.indexOf(e);return S.ev.adopted.has(si)});
  S.goldenUnlocked=allKeyAdopted&&!trapAdopted;
  S.scr='evidenceResult';render();
}

function goToRound(){
  S.cs+=S.ev.score;
  S.scr='round';S.ri=0;startRound();
}

function startRound(){
  S.fb=false;S.sel=null;
  const r=CASES[S.ci].rounds[S.ri];
  if(S.obj.tid){clearInterval(S.obj.tid);S.obj.tid=null}
  S.obj={active:!!r.objection,timer:4,tid:null,done:false,hit:false};
  render();
  if(S.obj.active){
    S.obj.tid=setInterval(()=>{
      S.obj.timer-=0.05;
      const ring=document.getElementById('obj-ring');
      if(ring)ring.style.setProperty('--ring-pct',(S.obj.timer/4*100)+'%');
      if(S.obj.timer<=0){
        clearInterval(S.obj.tid);S.obj.tid=null;S.obj.done=true;render();
      }
    },50);
  }
}

function handleObjection(){
  if(S.obj.tid){clearInterval(S.obj.tid);S.obj.tid=null}
  S.obj.hit=true;S.obj.done=true;
  S.cs+=2;S.conv=Math.min(100,S.conv+10);
  render();
}

function selectChoice(idx,isGolden=false){
  const r=CASES[S.ci].rounds[S.ri];
  const ch=isGolden?r.goldenChoice:r.choices[idx];
  const pts=ch.score;
  let convD=pts>=3?10:pts===2?5:pts===1?-3:-10;
  if(pts>=3)S.combo++;else S.combo=0;
  const mult=S.combo>=3?2:S.combo===2?1.5:1;
  convD=Math.round(convD*mult);
  S.conv=clamp(S.conv+convD,0,100);
  S.cs+=pts;S.rs.push(pts);
  S.sel=isGolden?-1:idx;S.fb=true;
  render();
  const fb=document.getElementById('feedback-box');
  if(fb)fb.scrollIntoView({behavior:'smooth',block:'center'});
}

function nextRound(){
  const c=CASES[S.ci];
  if(S.ri<c.rounds.length-1){S.ri++;startRound()}
  else{
    const ms=maxScore(S.ci);
    const prev=S.done[c.id];
    const best=prev?Math.max(S.cs,prev.best):S.cs;
    S.done[c.id]={score:S.cs,best};
    S.total=Object.values(S.done).reduce((a,v)=>a+v.best,0);
    save();S.scr='verdict';render();
  }
}

function resetGame(){S.done={};S.total=0;save();S.scr='title';render()}

function render(){
  const fn={title:renderTitle,caseSelect:renderCaseSelect,briefing:renderBriefing,
    evidence:renderEvidence,evidenceResult:renderEvidenceResult,round:renderRound,verdict:renderVerdict,final:renderFinal};
  (fn[S.scr]||renderTitle)();
  window.scrollTo({top:0,behavior:'smooth'});
}

  app.innerHTML=`<div style="background:var(--panel);border-radius:20px;padding:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,167,69,.1)">

function renderEvidence(){
  const c=CASES[S.ci];
  const evShuffled=shuffleEvidence(c.evidence,S.ci+1);
  const adoptedCount=S.ev.adopted.size;
  const items=evShuffled.map((e,i)=>{
    const on=S.ev.adopted.has(i);
    return `<div class="ev-item${on?' adopted':''}" onclick="toggleEvidence(${i})">
      <div class="ev-info">
        <div class="ev-title">📄 ${e.t}</div>
        <div class="ev-desc">${e.c}</div>
      </div>
      <button class="ev-toggle${on?' on':''}" onclick="event.stopPropagation();toggleEvidence(${i})"></button>
    </div>`}).join('');
  app.innerHTML=`<div class="ev-phase">
    <h3 class="serif">📋 证据审查</h3>
    <div class="ev-timer" id="ev-timer">${fmtTime(S.ev.timer)}</div>
    <p style="font-size:.85em;color:var(--text-dim);text-align:center;margin-bottom:14px">
      审阅全部证据线索，<b>采纳</b>你认为有效的证据，<b>排除</b>不可靠的材料</p>
    <div class="ev-list">${items}</div>
    <p style="text-align:center;margin-top:14px;font-size:.85em;color:var(--gold-light)">已采纳 ${adoptedCount} 条证据</p>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-primary" onclick="submitEvidence()">提交审查 →</button>
    </div>
  </div>`;
}

function renderEvidenceResult(){
  const c=CASES[S.ci];
  const evShuffled=shuffleEvidence(c.evidence,S.ci+1);
  const typeLabels={key:'关键证据',neutral:'一般材料',trap:'陷阱证据'};
  const typeIcons={key:'✅',neutral:'➖',trap:'⚠️'};
  let items='';
  evShuffled.forEach((e,i)=>{
    const adopted=S.ev.adopted.has(i);
    let cls='',icon='',note='';
    if(e.type==='key'){
      if(adopted){cls='correct';icon='✅';note='+2 分';}
      else{cls='wrong';icon='❌';note='遗漏关键证据';}
    }else if(e.type==='trap'){
      if(adopted){cls='wrong';icon='❌';note='-1 分（陷阱）';}
      else{cls='correct';icon='✅';note='正确排除';}
    }else{
      cls='neutral';icon='➖';note='无影响';
    }
    items+=`<div class="ev-result-item ${cls}">
      <span class="ev-r-icon">${icon}</span>
      <span class="ev-r-text"><b>${e.t}</b><br><span style="font-size:.8em;color:var(--text-dim)">${typeLabels[e.type]}</span></span>
      <span style="font-size:.8em;font-weight:600">${note}</span>
    </div>`;
  });
  const perfect=S.goldenUnlocked;
  app.innerHTML=`<div class="ev-phase">
    <div class="ev-score-summary">
      <div class="wax-seal" style="width:48px;height:48px;font-size:1.2em;margin:0 auto 10px">${perfect?'⭐':'📋'}</div>
      <h3 class="serif" style="margin-bottom:6px">${perfect?'完美审查！':'证据审查结果'}</h3>
      <div style="font-size:1.6em;font-weight:700;color:var(--gold)">${S.ev.score} / 6 分</div>
      ${perfect?'<p style="font-size:.82em;color:var(--green);margin-top:6px">✨ 解锁黄金辩护选项</p>':''}
    </div>
    <div class="ev-result-list">${items}</div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-primary" onclick="goToRound()">进入辩论 →</button>
    </div>
  </div>`;
}

function renderRound(){
  const c=CASES[S.ci],r=c.rounds[S.ri],th=THEMES[c.category]||THEMES.contract;
  const jE=JUDGE_EMOJIS[judgeIdx(S.conv)];
  const cE=CLIENT_EMOJIS[clientIdx(S.conv)];
  const oE=OPP_EMOJIS[oppIdx(S.conv)];
  const barColor=S.conv>=60?'var(--green)':S.conv>=40?'var(--orange)':'var(--red)';
  const ms=maxScore(S.ci);

  // Conviction bar
  let html=`<div style="background:var(--panel);border-radius:20px;padding:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(212,167,69,.1)">
  <div style="margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;font-size:.85em;color:var(--text-dim)">
    <span>法官心证</span><span>${S.conv}% ${jE}</span></div>
    <div class="conviction-bar"><div class="fill" style="width:${S.conv}%;background:${barColor}"></div></div>`;

  // Emotion row
  html+=`<div class="emotion-row">
    <div class="client"><span class="emoji">${cE}</span><span class="label">当事人</span></div>
    ${S.combo>=2?`<span class="combo-badge">🔥 x${S.combo}</span>`:''}
    <div class="opponent"><span class="label">对方律师</span><span class="emoji">${oE}</span></div>
  </div>`;

  // Round badge + score
  html+=`<div><span class="round-badge">${r.phase} · 第 ${S.ri+1}/${c.rounds.length} 轮</span>
    <span class="score-display">${S.cs} 分</span></div>`;

  // Progress bar
  const pct=(S.ri+1)/c.rounds.length*100;
  html+=`<div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>`;

  // Dialogue
  html+=`<div class="dialogue">`;
  // If objection was hit, show rebuttal first
  if(S.obj.hit&&r.objection){
    html+=`<div class="dialogue-item player"><div class="avatar">👆</div><div class="bubble" style="background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3)"><b>异议！</b> ${r.objection.flaw}</div></div>`;
    html+=`<div class="dialogue-item narrator"><div class="avatar">⚖️</div><div class="bubble">${r.objection.rebuttal}</div></div>`;
  }
  r.dialogue.forEach(d=>{
    const cls=d.speaker;
    const av=d.speaker==='judge'?'👨‍⚖️':d.speaker==='opponent'?'🧑‍💼':'📖';
    html+=`<div class="dialogue-item ${cls}"><div class="avatar">${av}</div><div class="bubble">${d.name?`<b>${d.name}：</b>`:''}${d.text}</div></div>`;
  });
  html+=`</div>`;

  // Objection overlay
  if(S.obj.active&&!S.obj.done&&!S.fb){
    const ringPct=(S.obj.timer/4*100);
    html+=`<div class="objection-wrap"><button class="objection-btn" onclick="handleObjection()">
      <div class="countdown-ring" id="obj-ring" style="--ring-pct:${ringPct}%"></div>
      异议！</button></div>`;
  }

  // Build choices list (mix golden in if unlocked)
  const hasGolden=S.ri===c.goldenRound&&S.goldenUnlocked&&r.goldenChoice;
  const allChoices=r.choices.map((ch,i)=>({ch,idx:i,isGolden:false}));
  if(hasGolden){
    const gPos=(S.ci*7+S.ri*3)%allChoices.length;
    allChoices.splice(gPos,0,{ch:r.goldenChoice,idx:0,isGolden:true});
  }

  // Choices
  if(!S.fb){
    html+=`<div class="choices-section"><p style="font-size:.9em;font-weight:600;margin-bottom:10px">${r.question}</p>`;
    allChoices.forEach(item=>{
      html+=`<button class="choice-btn" onclick="selectChoice(${item.idx},${item.isGolden})">${item.ch.text}</button>`;
    });
    html+=`</div>`;
  } else {
    // Feedback
    const selCh=S.sel===-1?r.goldenChoice:r.choices[S.sel];
    const bestIdx=r.choices.reduce((bi,ch,i)=>ch.score>r.choices[bi].score?i:bi,0);
    html+=`<div class="choices-section"><p style="font-size:.9em;font-weight:600;margin-bottom:10px">${r.question}</p>`;
    allChoices.forEach(item=>{
      let cls='choice-btn disabled';
      if(item.isGolden){
        if(S.sel===-1)cls+=' correct';
        else cls+=' best';
      }else{
        if(S.sel===item.idx)cls+=item.ch.score===r.choices[bestIdx].score?' correct':item.ch.score>=2?' correct':' wrong';
        else if(item.idx===bestIdx&&S.sel!==-1)cls+=' best';
      }
      const mark=(!item.isGolden&&item.idx===bestIdx&&S.sel!==-1)?' ✓':(item.isGolden&&S.sel!==-1?' ✓':'');
      html+=`<button class="${cls}">${item.ch.text}${mark}</button>`;
    });
    const fbCls=selCh.score>=3?'good':selCh.score>=1?'ok':'bad';
    html+=`<div class="feedback ${fbCls}" id="feedback-box">${selCh.feedback}</div>`;
    const isLast=S.ri>=c.rounds.length-1;
    html+=`<div style="text-align:center;margin-top:16px">
      <button class="btn btn-primary" onclick="nextRound()">${isLast?'听取判决 →':'下一轮辩论 →'}</button></div>`;
    html+=`</div>`;
  }

  html+=`</div>`;
  app.innerHTML=html;
}

function renderVerdict(){
  const c=CASES[S.ci],ms=maxScore(S.ci);
  const pct=ms>0?Math.round(S.cs/ms*100):0;
  const vk=pct>=80?'w':pct>=50?'p':'l';
  const sealIcons={w:'⚖️',p:'📜',l:'📝'};
  const titles={w:'胜诉',p:'部分胜诉',l:'需要加强'};
  const colors={w:'var(--green)',p:'var(--orange)',l:'var(--red)'};
  const vText=c.verdict[vk];
  const evRow=`<tr><td>证据审查</td><td>+${S.ev.score}</td></tr>`;
  const rows=evRow+S.rs.map((s,i)=>`<tr><td>${c.rounds[i]?c.rounds[i].phase:'第'+(i+1)+'轮'}</td><td>+${s}</td></tr>`).join('');
  const allDone=casesDone()>=CASES.length;

  app.innerHTML=`<div class="verdict">
    <div class="wax-seal" style="margin:0 auto 12px">${sealIcons[vk]}</div>
    <div class="title serif" style="color:${colors[vk]}">${titles[vk]}</div>
    <div class="score" id="v-score">0</div>
    <p style="font-size:.85em;color:var(--text-dim)">满分 ${ms} · 正确率 ${pct}%</p>
    <hr class="brass-divider">
    <div style="margin:16px 0;text-align:left" class="dialogue">
      <div class="dialogue-item judge"><div class="avatar">👨‍⚖️</div><div class="bubble"><b>法官宣判：</b>${vText}</div></div>
    </div>
    <div style="font-size:.85em;color:var(--text-dim);margin-bottom:12px">最终心证：${S.conv}% ${JUDGE_EMOJIS[judgeIdx(S.conv)]}</div>
    <table class="breakdown">${rows}</table>
    <div style="display:flex;gap:10px;margin-top:24px;justify-content:center">
      <button class="btn btn-secondary" onclick="goTo('caseSelect')">选择案件</button>
      <button class="btn btn-primary" onclick="${allDone?"goTo('final')":"goTo('caseSelect')"}">${allDone?'查看总评':'继续挑战'}</button>
    </div>
  </div>`;
  const el=document.getElementById('v-score');
  if(el)animNum(el,0,S.cs,600);
}

function renderFinal(){
  const totalMax=CASES.reduce((a,c)=>a+maxScore(CASES.indexOf(c)),0);
  const totalBest=Object.values(S.done).reduce((a,v)=>a+v.best,0);
  const pct=totalMax>0?Math.round(totalBest/totalMax*100):0;
  const ranks=[
    [90,'👑','金牌律师'],[75,'⭐','资深律师'],[60,'📜','执业律师'],
    [45,'📖','实习律师'],[30,'🎓','法学新生'],[0,'📚','法律爱好者']
  ];
  const rank=ranks.find(r=>pct>=r[0])||ranks[ranks.length-1];
  const items=CASES.map(c=>{
    const d=S.done[c.id];
    const ms=maxScore(CASES.indexOf(c));
    return `<div class="item"><span>${c.icon} ${c.title}</span><span style="color:var(--gold-light)">${d?d.best+'/'+ms:'未完成'}</span></div>`;
  }).join('');

  app.innerHTML=`<div class="final">
    <div class="wax-seal" style="width:80px;height:80px;font-size:2em;margin:0 auto 12px">${rank[1]}</div>
    <h2 class="serif" style="margin:8px 0 4px">${rank[2]}</h2>
    <p style="font-size:.85em;color:var(--text-dim)">综合正确率 ${pct}%</p>
    <div class="total-score" id="f-score">0</div>
    <p style="font-size:.8em;color:var(--text-muted)">总分 ${totalBest} / ${totalMax}</p>
    <div class="case-summary">${items}</div>
    <div style="display:flex;gap:10px;margin-top:24px;justify-content:center">
      <button class="btn btn-secondary" onclick="resetGame()">重新开始</button>
      <button class="btn btn-primary" onclick="goTo('caseSelect')">再战一局</button>
    </div>
    <p style="font-size:.7em;color:var(--text-muted);margin-top:20px;line-height:1.5">
      本游戏基于《中华人民共和国民法典》设计，仅供学习参考，不构成法律建议。</p>
  </div>`;
  const el=document.getElementById('f-score');
  if(el)animNum(el,0,totalBest,700);
}

load();
render();
// ENGINE END
</script>
</body>
</html>
